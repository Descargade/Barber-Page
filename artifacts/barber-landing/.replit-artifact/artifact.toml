kind = "web"
previewPath = "/"
title = "Premium Barber Landing Page"
version = "1.0.0"
id = "artifacts/barber-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25715

[services.development]
run = "pnpm --filter @workspace/barber-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barber-landing", "run", "build" ]
publicDir = "artifacts/barber-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25715"
BASE_PATH = "/"
